<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oikia — Your Independent AI Property Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,900;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:       #0a0908;
  --cream:     #f5f0e6;
  --warm:      #ede8db;
  --gold:      #b8860b;
  --gold-lt:   #d4a520;
  --sage:      #3d5c34;
  --sage-lt:   #5a8050;
  --bg:        #0d0c0a;
  --panel:     #131210;
  --surface:   #1a1815;
  --border:    rgba(255,255,255,0.07);
  --border-lt: rgba(255,255,255,0.12);
  --text-dim:  rgba(245,240,230,0.55);
  --red:       #c0392b;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--cream);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 60px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
}

.brand {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.02em;
  color: var(--cream);
}
.brand span { color: var(--gold); }

.tagline {
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* Language Toggle */
.lang-toggle {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--border-lt);
  border-radius: 6px;
  overflow: hidden;
}
.lang-btn {
  padding: 8px 18px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.08em;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-dim);
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.lang-btn.active {
  background: var(--gold);
  color: var(--ink);
  font-weight: 600;
}
.lang-btn:hover:not(.active) {
  color: var(--cream);
  background: rgba(255,255,255,0.05);
}

/* ── MAIN LAYOUT ── */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
}

/* ── LEFT — VIDEO PANEL ── */
.video-panel {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #080706;
  overflow: hidden;
}

/* Atmospheric background */
.video-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 40% 50%, rgba(184,134,11,0.08) 0%, transparent 65%),
              radial-gradient(ellipse at 80% 20%, rgba(61,92,52,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 1;
}

.video-wrap {
  position: relative;
  width: 100%;
  height: 100%;
  z-index: 2;
}

.oikia-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.oikia-video.visible { opacity: 1; }

/* Thumbnail / poster state */
.video-poster {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #111009 0%, #0d0c0a 100%);
  z-index: 3;
  transition: opacity 0.5s ease, visibility 0.5s ease;
  cursor: pointer;
}
.video-poster.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.poster-face {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 2px solid rgba(184,134,11,0.3);
  overflow: hidden;
  margin-bottom: 28px;
  box-shadow: 0 0 60px rgba(184,134,11,0.15);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Verena initial — elegant monogram */
.poster-initial {
  font-family: 'Fraunces', serif;
  font-size: 72px;
  font-weight: 300;
  color: var(--gold);
  opacity: 0.8;
}

.poster-name {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--cream);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.poster-role {
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 36px;
}

/* Play button */
.play-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--gold);
  color: var(--ink);
  border: none;
  border-radius: 50px;
  padding: 16px 32px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 8px 32px rgba(184,134,11,0.35);
}
.play-btn:hover {
  background: var(--gold-lt);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(184,134,11,0.45);
}
.play-icon {
  width: 20px;
  height: 20px;
  background: var(--ink);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.play-icon svg { margin-left: 2px; }

/* Bottom label on video */
.video-label {
  position: absolute;
  bottom: 24px;
  left: 24px;
  z-index: 10;
  background: rgba(13,12,10,0.75);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-lt);
  border-radius: 8px;
  padding: 10px 16px;
  display: none;
}
.video-label.show { display: block; }
.video-label-name {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--cream);
}
.video-label-role {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* ── RIGHT — CHAT PANEL ── */
.chat-panel {
  display: flex;
  flex-direction: column;
  background: var(--panel);
  border-left: 1px solid var(--border);
  overflow: hidden;
}

/* Chat header */
.chat-header {
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-header-title {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--cream);
  margin-bottom: 3px;
}
.chat-header-sub {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
}

/* Chat messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.msg {
  display: flex;
  gap: 12px;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
}
.msg.oikia .msg-avatar {
  background: linear-gradient(135deg, var(--gold), var(--sage));
  color: white;
  font-family: 'Fraunces', serif;
}
.msg.user .msg-avatar {
  background: var(--surface);
  color: var(--text-dim);
  border: 1px solid var(--border-lt);
}

.msg-bubble {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.6;
}
.msg.oikia .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--cream);
  border-top-left-radius: 4px;
}
.msg.user .msg-bubble {
  background: var(--gold);
  color: var(--ink);
  border-top-right-radius: 4px;
  font-weight: 500;
}

/* Typing indicator */
.typing-indicator {
  display: flex;
  gap: 12px;
  align-items: flex-end;
}
.typing-dots {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  border-top-left-radius: 4px;
  padding: 14px 18px;
  display: flex;
  gap: 5px;
  align-items: center;
}
.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  animation: dot 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot {
  0%,60%,100% { opacity:0.3; transform:translateY(0); }
  30%          { opacity:1;   transform:translateY(-4px); }
}

/* Quick questions */
.quick-questions {
  padding: 12px 28px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}
.quick-q {
  background: transparent;
  border: 1px solid var(--border-lt);
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 11.5px;
  color: var(--text-dim);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  white-space: nowrap;
}
.quick-q:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(184,134,11,0.06);
}

/* Chat input */
.chat-input-wrap {
  padding: 16px 28px 20px;
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--surface);
  border: 1px solid var(--border-lt);
  border-radius: 12px;
  padding: 10px 14px;
  transition: border-color 0.2s;
}
.input-row:focus-within {
  border-color: rgba(184,134,11,0.4);
}
.chat-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  line-height: 1.5;
  resize: none;
  outline: none;
  max-height: 100px;
  scrollbar-width: none;
}
.chat-input::placeholder { color: var(--text-dim); }
.send-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: var(--gold);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--gold-lt); transform: translateY(-1px); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.send-btn svg { fill: var(--ink); }

/* Scrollbar */
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── FOOTER ── */
.footer-bar {
  height: 36px;
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.footer-text {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  text-transform: uppercase;
}
.footer-text strong {
  color: var(--gold);
  font-weight: 600;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="brand">Oik<span>ia</span></div>
  </div>
  <div class="tagline">Independent AI Property Advisor</div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')" id="btn-en">English</button>
    <button class="lang-btn" onclick="setLang('af')" id="btn-af">Afrikaans</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- VIDEO PANEL -->
  <div class="video-panel">

    <!-- Poster / click to play -->
    <div class="video-poster" id="videoPoster" onclick="playVideo()">
      <div class="poster-face">
        <div class="poster-initial">V</div>
      </div>
      <div class="poster-name">Oikia</div>
      <div class="poster-role" id="posterRole">Your Independent Property Advisor</div>
      <button class="play-btn">
        <div class="play-icon">
          <svg width="10" height="12" viewBox="0 0 10 12" fill="white">
            <path d="M1 1l8 5-8 5V1z"/>
          </svg>
        </div>
        <span id="playBtnText">Meet Oikia</span>
      </button>
    </div>

    <!-- Video -->
    <div class="video-wrap">
      <!-- English video -->
      <video class="oikia-video" id="videoEN" playsinline
        onended="videoEnded()"
        oncanplay="videoReady('en')">
        <source src="Avatar_Video_1080p__1_.mp4" type="video/mp4">
      </video>
      <!-- Afrikaans video -->
      <video class="oikia-video" id="videoAF" playsinline
        onended="videoEnded()"
        oncanplay="videoReady('af')">
        <source src="Avatar_Video_1080p.mp4" type="video/mp4">
      </video>
    </div>

    <!-- Video label shown during play -->
    <div class="video-label" id="videoLabel">
      <div class="video-label-name">Oikia</div>
      <div class="video-label-role" id="labelRole">Independent Property Advisor</div>
    </div>

  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel">

    <div class="chat-header">
      <div class="chat-header-title" id="chatTitle">Ask Oikia anything about property</div>
      <div class="chat-header-sub" id="chatSub">No commission. No agenda. Just clarity.</div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <!-- Messages appear here -->
    </div>

    <div class="quick-questions" id="quickQuestions">
      <!-- Quick questions populated by JS -->
    </div>

    <div class="chat-input-wrap">
      <div class="input-row">
        <textarea class="chat-input" id="chatInput"
          rows="1"
          placeholder="Ask Oikia a question..."
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="14" height="14" viewBox="0 0 14 14">
            <path d="M1 7h12M7 1l6 6-6 6"/>
            <path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M1 7h12M7 1l6 6-6 6"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer-bar">
  <div class="footer-text">
    <strong>Oikia</strong> — Independent AI Property Advisor · No commission · No hidden agenda
  </div>
</div>

<script>
// ── STATE ──
let currentLang = 'en';
let busy = false;
let chatHistory = [];
let videoPlaying = false;

// ── LANGUAGE CONTENT ──
const content = {
  en: {
    posterRole: 'Your Independent Property Advisor',
    playBtn: 'Meet Oikia',
    labelRole: 'Independent Property Advisor',
    chatTitle: 'Ask Oikia anything about property',
    chatSub: 'No commission. No agenda. Just clarity.',
    inputPlaceholder: 'Ask Oikia a question...',
    quickQs: [
      'Am I ready to buy property?',
      'What costs do first-time buyers miss?',
      'How do I know a property is priced fairly?',
      'What should pensioners look for?',
      'How does Oikia work?'
    ],
    welcomeMsg: "Hello. I'm Oikia — your independent property advisor. Buying property is one of the biggest decisions you will ever make. Whether you're a first-time buyer, scaling up or down, retiring, investing, or making a corporate acquisition — I'm here to give you honest guidance. No commission. No agenda. What would you like to know?",
    system: `You are Oikia, an independent AI property advisor serving South African property buyers. You are warm, authoritative, and completely independent — you earn no commission and have no agenda except the buyer's best interest.

You serve ALL types of buyers:
- First-time buyers
- People scaling up or down
- Pensioners finding their ideal retirement home
- Property investors seeking value
- Corporate buyers seeking business sense

Key principles:
- Property is the biggest asset most people will ever own — treat every question with that gravity
- Always honest, never a sales pitch
- Give practical, specific South African advice
- Keep answers clear and helpful — not too long
- You speak English in this mode

Always respond with warmth and authority. Never recommend specific properties or agents — guide the buyer's thinking instead.`
  },
  af: {
    posterRole: 'Jou Onafhanklike Eiendomsadviseur',
    playBtn: 'Ontmoet Oikia',
    labelRole: 'Onafhanklike Eiendomsadviseur',
    chatTitle: 'Vra Oikia enigiets oor eiendom',
    chatSub: 'Geen kommissie. Geen agenda. Net duidelikheid.',
    inputPlaceholder: 'Vra Oikia \'n vraag...',
    quickQs: [
      'Is ek gereed om eiendom te koop?',
      'Watter kostes mis eerste kopers?',
      'Hoe weet ek of \'n eiendom reg geprysd is?',
      'Wat moet pensioenarisse soek?',
      'Hoe werk Oikia?'
    ],
    welcomeMsg: "Goeiedag. Ek is Oikia — jou onafhanklike eiendomsadviseur. Om eiendom te koop is een van die grootste besluite wat jy ooit sal neem. Of jy nou jou eerste huis koop, op- of afskaal, aftree, belê, of 'n korporatiewe aankoop oorweeg — ek is hier om jou eerlike leiding te gee. Geen kommissie. Geen verborge agenda. Wat wil jy weet?",
    system: `Jy is Oikia, 'n onafhanklike KI-eiendomsadviseur wat Suid-Afrikaanse eiendomskopers bedien. Jy is warm, gesaghebbend, en volledig onafhanklik — jy verdien geen kommissie en het geen agenda behalwe die koper se beste belang nie.

Jy bedien ALLE tipes kopers:
- Eerste kopers
- Mense wat op- of afskaal
- Pensioenarisse wat hul ideale aftree-tuiste soek
- Eiendomsbeleggers wat waarde soek
- Korporatiewe kopers

Kernbeginsels:
- Eiendom is die grootste bate wat die meeste mense ooit sal besit — behandel elke vraag met daardie erns
- Altyd eerlik, nooit 'n verkoopspraatjie
- Gee praktiese, spesifieke Suid-Afrikaanse advies
- Hou antwoorde duidelik en nuttig
- Praat Afrikaans in hierdie modus

Reageer altyd met warmte en gesag. Beveel nooit spesifieke eiendomme of agente aan nie — lei eerder die koper se denke.`
  }
};

// ── LANGUAGE SWITCH ──
function setLang(lang) {
  currentLang = lang;
  const c = content[lang];

  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-af').classList.toggle('active', lang === 'af');
  document.getElementById('posterRole').textContent = c.posterRole;
  document.getElementById('playBtnText').textContent = c.playBtn;
  document.getElementById('labelRole').textContent = c.labelRole;
  document.getElementById('chatTitle').textContent = c.chatTitle;
  document.getElementById('chatSub').textContent = c.chatSub;
  document.getElementById('chatInput').placeholder = c.inputPlaceholder;

  renderQuickQs();

  // If video is playing, switch video
  if (videoPlaying) {
    const enVid = document.getElementById('videoEN');
    const afVid = document.getElementById('videoAF');
    if (lang === 'en') {
      afVid.pause();
      afVid.classList.remove('visible');
      enVid.currentTime = 0;
      enVid.play();
      enVid.classList.add('visible');
    } else {
      enVid.pause();
      enVid.classList.remove('visible');
      afVid.currentTime = 0;
      afVid.play();
      afVid.classList.add('visible');
    }
  }

  // Reset chat with new language welcome
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = '';
  addOikiaMessage(c.welcomeMsg);
}

// ── VIDEO ──
function videoReady(lang) {
  // Video can play — nothing needed until user clicks
}

function playVideo() {
  const poster = document.getElementById('videoPoster');
  const label = document.getElementById('videoLabel');
  const vid = currentLang === 'en'
    ? document.getElementById('videoEN')
    : document.getElementById('videoAF');

  poster.classList.add('hidden');
  label.classList.add('show');
  vid.classList.add('visible');
  vid.play().catch(() => {
    // Autoplay blocked — show poster again
    poster.classList.remove('hidden');
  });
  videoPlaying = true;
}

function videoEnded() {
  const poster = document.getElementById('videoPoster');
  const label = document.getElementById('videoLabel');
  const enVid = document.getElementById('videoEN');
  const afVid = document.getElementById('videoAF');

  enVid.classList.remove('visible');
  afVid.classList.remove('visible');
  label.classList.remove('show');

  // Show poster again after video ends
  setTimeout(() => {
    poster.classList.remove('hidden');
  }, 400);

  videoPlaying = false;
}

// ── CHAT ──
function renderQuickQs() {
  const wrap = document.getElementById('quickQuestions');
  const qs = content[currentLang].quickQs;
  wrap.innerHTML = qs.map(q =>
    `<button class="quick-q" onclick="sendQuick('${q.replace(/'/g, "\\'")}')">${q}</button>`
  ).join('');
}

function addOikiaMessage(text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg oikia';
  div.innerHTML = `
    <div class="msg-avatar">O</div>
    <div class="msg-bubble">${escHtml(text)}</div>
  `;
  container.appendChild(div);
  scrollToBottom();
}

function addUserMessage(text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-bubble">${escHtml(text)}</div>
    <div class="msg-avatar">U</div>
  `;
  container.appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg oikia';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">O</div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  `;
  container.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || busy) return;

  busy = true;
  input.value = '';
  autoResize(input);
  document.getElementById('sendBtn').disabled = true;

  addUserMessage(text);
  chatHistory.push({ role: 'user', content: text });
  showTyping();

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: content[currentLang].system,
        messages: chatHistory
      })
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || (currentLang === 'af'
      ? 'Verskoon my — kan jy dit herhaal?'
      : 'I apologise — could you rephrase that?');
    removeTyping();
    addOikiaMessage(reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    removeTyping();
    addOikiaMessage(currentLang === 'af'
      ? 'Iets het stilgeword — probeer asseblief weer.'
      : 'Something went quiet on my end — please try again.');
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function sendQuick(q) {
  document.getElementById('chatInput').value = q;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function scrollToBottom() {
  const c = document.getElementById('chatMessages');
  setTimeout(() => { c.scrollTop = c.scrollHeight; }, 60);
}

function escHtml(t) {
  return t
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

// ── INIT ──
setLang('en');
</script>
